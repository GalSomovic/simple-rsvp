server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy API + media to the backend service inside the cluster.
  location /api/ {
    proxy_pass http://rsvp-backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }
  location /media/ {
    proxy_pass http://rsvp-backend:8000;
  }

  # Twilio reaches its webhooks through this same hostname.
  location /webhooks/ {
    proxy_pass http://rsvp-backend:8000;
    proxy_set_header Host $host;
  }

  # SPA fallback.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
