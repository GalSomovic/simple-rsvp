# Copy to secrets.yaml, fill in real values, and DO NOT commit secrets.yaml.
#   kubectl apply -f secrets.yaml
# Or create from the CLI instead of YAML:
#   kubectl -n wedding-rsvp create secret generic rsvp-postgres --from-literal=password=...
#   kubectl -n wedding-rsvp create secret generic rsvp-backend \
#     --from-literal=ACCESS_CODE=... \
#     --from-literal=TWILIO_ACCOUNT_SID=AC... \
#     --from-literal=TWILIO_AUTH_TOKEN=... \
#     --from-literal=TWILIO_FROM_NUMBER=+1...
apiVersion: v1
kind: Secret
metadata:
  name: rsvp-postgres
  namespace: wedding-rsvp
type: Opaque
stringData:
  password: change-this-db-password
---
apiVersion: v1
kind: Secret
metadata:
  name: rsvp-backend
  namespace: wedding-rsvp
type: Opaque
stringData:
  ACCESS_CODE: change-this-access-code
  TWILIO_ACCOUNT_SID: ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  TWILIO_AUTH_TOKEN: your-twilio-auth-token
  TWILIO_FROM_NUMBER: "+12025550123"
