apiVersion: apps/v1
kind: Deployment
metadata:
  name: rsvp-backend
  namespace: wedding-rsvp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rsvp-backend
  template:
    metadata:
      labels:
        app: rsvp-backend
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: backend
          # Built & pushed by GitHub Actions (.github/workflows/build.yml).
          # Public GHCR package — the node pulls it without a pull secret.
          image: ghcr.io/galsomovic/simple-rsvp-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            # DB_PASSWORD must come before DATABASE_URL — k8s only expands $(VAR)
            # references to variables defined earlier in the list.
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rsvp-postgres
                  key: password
            - name: DATABASE_URL
              value: postgresql+psycopg2://rsvp:$(DB_PASSWORD)@rsvp-postgres:5432/rsvp
            - name: DEFAULT_REGION
              value: IL
            # Single public origin (frontend hostname) — Twilio reaches /webhooks/* and /media/* here.
            - name: PUBLIC_BASE_URL
              value: https://rsvp.example.com
          envFrom:
            - secretRef:
                name: rsvp-backend # ACCESS_CODE, TWILIO_* (see secrets.example.yaml)
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rsvp-backend
  namespace: wedding-rsvp
spec:
  selector:
    app: rsvp-backend
  ports:
    - port: 8000
      targetPort: 8000
